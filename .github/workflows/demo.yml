name: Deploy demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:demo
        env:
          # Pages deploys at https://<user>.github.io/atomic-editor/, so
          # the demo needs its asset URLs prefixed with /atomic-editor/.
          # Vite reads this via `base` in vite.config.ts — we pass it
          # through the env so the repo name lives in exactly one place
          # (here) and swapping repos is a one-line edit.
          VITE_BASE: /atomic-editor/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
